<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Move"/>
  <title>Move — Daily Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#F5F0E8;font-family:'DM Sans',sans-serif}
    #root{height:100%}
    .tab-btn{background:none;border:none;cursor:pointer;padding:8px 0;display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
    .pill-btn{border:none;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:8px 14px;transition:all .15s}
    .add-btn{background:#F0EBE3;color:#1A1A1A}
    .add-btn:active{background:#E4DDD2;transform:scale(.97)}
    .card{background:#fff;border-radius:20px;padding:20px;box-shadow:0 2px 16px rgba(0,0,0,.06)}
    .section-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#8B8578;margin-bottom:10px}
    textarea,input[type=text]{font-family:'DM Sans',sans-serif}
    ::-webkit-scrollbar{display:none}
    .nav-btn{background:#F0EBE3;border:none;border-radius:50%;width:36px;height:36px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#1A1A1A;flex-shrink:0}
    .day-cell{border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;transition:transform .1s;padding:4px 1px;min-height:36px;width:100%}
    .day-cell:active{transform:scale(.88)}
    .backup-btn{width:100%;padding:14px;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
    .backup-btn:active{transform:scale(.97)}
    .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1}
    .overlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;justify-content:flex-end}
    .overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,.45)}
    .sheet{position:relative;background:#F5F0E8;border-radius:24px 24px 0 0;max-height:90vh;overflow-y:auto;padding:0 16px 52px}
    .handle{width:36px;height:4px;background:#D0C8BC;border-radius:2px;margin:12px auto 14px}
  </style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef,useMemo}=React;

// ── Local-timezone date helpers ───────────────────────────────────────────────
const localDateStr=(d=new Date())=>[d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('-');
const todayStr=()=>localDateStr();
const strToDate=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)};
const fmtShort=s=>strToDate(s).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
const fmtFull=s=>strToDate(s).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
const monthLabel=(y,m)=>new Date(y,m,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
const monthShort=(y,m)=>new Date(y,m,1).toLocaleDateString('en-US',{month:'short'});

function getWeeks(year,month){
  const first=new Date(year,month,1).getDay();
  const total=new Date(year,month+1,0).getDate();
  const cells=[];
  for(let i=0;i<first;i++)cells.push(null);
  for(let d=1;d<=total;d++)cells.push(localDateStr(new Date(year,month,d)));
  while(cells.length%7)cells.push(null);
  const weeks=[];
  for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));
  return weeks;
}

// ── Storage ───────────────────────────────────────────────────────────────────
const PFX='move:day:';
const emptyDay=()=>({walkMinutes:0,resistance:false,sports:[],moodAM:null,moodPM:null,notes:''});
const loadDay=date=>{try{const r=localStorage.getItem(PFX+date);return r?JSON.parse(r):emptyDay()}catch{return emptyDay()}};
const saveDay=(date,data)=>{try{localStorage.setItem(PFX+date,JSON.stringify(data))}catch{}};
const getAllData=()=>{const a={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith(PFX)){try{a[k]=JSON.parse(localStorage.getItem(k))}catch{}}}return a};
const restoreAllData=obj=>Object.entries(obj).forEach(([k,v])=>{if(k.startsWith(PFX)){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}});

const showToast=msg=>{const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2800)};

// ── Constants ─────────────────────────────────────────────────────────────────
const WALK_GOAL=90;
const MOODS=[{val:1,e:'😞'},{val:2,e:'😕'},{val:3,e:'😐'},{val:4,e:'🙂'},{val:5,e:'😄'}];
const SPORTS=['🏐 Volleyball','🚴 Cycling','🏊 Swimming','🎾 Tennis','🧘 Yoga','🏃 Run'];
const DAY_NAMES=['Su','Mo','Tu','We','Th','Fr','Sa'];

// ── Heat color ────────────────────────────────────────────────────────────────
const heatColor=mins=>{
  if(!mins||mins===0)return '#EDE8E0';
  if(mins>=WALK_GOAL)return '#2D5A3D';
  if(mins>=60)return '#6AAF82';
  if(mins>=30)return '#A3CDB0';
  return '#D0E8D8';
};
const heatTextColor=mins=>mins>=WALK_GOAL?'#fff':'#1A1A1A';

// ── WalkRing ──────────────────────────────────────────────────────────────────
function WalkRing({minutes,goal,size=140}){
  const r=size*.37,circ=2*Math.PI*r,pct=Math.min(minutes/goal,1),done=minutes>=goal;
  return(
    <div style={{position:'relative',width:size,height:size,margin:'0 auto'}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E8E0D0" strokeWidth={size*.07}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={done?'#2D5A3D':'#E8A84C'} strokeWidth={size*.07}
          strokeDasharray={`${pct*circ} ${circ}`} strokeLinecap="round" style={{transition:'stroke-dasharray .5s ease'}}/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
        <span style={{fontSize:size*.2,fontWeight:700,color:done?'#2D5A3D':'#1A1A1A',fontFamily:"'DM Serif Display',serif"}}>{minutes}</span>
        <span style={{fontSize:size*.08,color:'#8B8578',letterSpacing:1,textTransform:'uppercase'}}>/ {goal} min</span>
        {done&&<span style={{fontSize:size*.12,marginTop:2}}>✓</span>}
      </div>
    </div>
  );
}

// ── MoodPicker ────────────────────────────────────────────────────────────────
function MoodPicker({value,onChange,label}){
  return(
    <div>
      <p style={{margin:'0 0 8px',fontSize:11,textTransform:'uppercase',letterSpacing:1,color:'#8B8578'}}>{label}</p>
      <div style={{display:'flex',gap:4,justifyContent:'center'}}>
        {MOODS.map(m=>(
          <button key={m.val} onClick={()=>onChange(value===m.val?null:m.val)} style={{
            background:value===m.val?'#2D5A3D':'#F0EBE3',border:'none',borderRadius:12,
            padding:'5px 6px',fontSize:15,cursor:'pointer',
            transform:value===m.val?'scale(1.15)':'scale(1)',transition:'all .15s',
            boxShadow:value===m.val?'0 2px 8px rgba(45,90,61,.3)':'none'
          }}>{m.e}</button>
        ))}
      </div>
    </div>
  );
}

// ── DayEditSheet ──────────────────────────────────────────────────────────────
function DayEditSheet({dateStr,onClose,onSaved}){
  const [data,setData]=useState(()=>loadDay(dateStr));
  const [sportInput,setSportInput]=useState('');
  const [showSports,setShowSports]=useState(false);
  const isToday=dateStr===todayStr();

  const upd=patch=>{const next={...data,...patch};setData(next);saveDay(dateStr,next);onSaved(dateStr,next)};
  const toggleSport=s=>{const c=data.sports||[];upd({sports:c.includes(s)?c.filter(x=>x!==s):[...c,s]})};
  const addCustom=()=>{if(!sportInput.trim())return;upd({sports:[...(data.sports||[]),sportInput.trim()]});setSportInput('')};

  return(
    <div className="overlay">
      <div className="overlay-bg" onClick={onClose}/>
      <div className="sheet">
        <div className="handle"/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div>
            <p style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:'#1A1A1A'}}>{fmtShort(dateStr)}</p>
            {isToday&&<span style={{fontSize:11,color:'#2D5A3D',fontWeight:600,letterSpacing:.5}}>TODAY</span>}
          </div>
          <button onClick={onClose} style={{background:'#E8E0D0',border:'none',borderRadius:'50%',width:32,height:32,fontSize:15,cursor:'pointer',color:'#555'}}>✕</button>
        </div>

        {/* Walk */}
        <div className="card" style={{marginBottom:12}}>
          <p className="section-label">Walk Minutes</p>
          <WalkRing minutes={data.walkMinutes} goal={WALK_GOAL} size={120}/>
          <div style={{display:'flex',gap:7,marginTop:12,justifyContent:'center',flexWrap:'wrap'}}>
            {[15,30,45,60,90].map(m=>(
              <button key={m} className="pill-btn add-btn" onClick={()=>upd({walkMinutes:Math.min(data.walkMinutes+m,300)})}> +{m}</button>
            ))}
          </div>
          {data.walkMinutes>0&&<button onClick={()=>upd({walkMinutes:0})} style={{display:'block',margin:'8px auto 0',background:'none',border:'none',color:'#C09070',fontSize:12,cursor:'pointer'}}>Reset</button>}
        </div>

        {/* Resistance + Sports */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
          <div className="card" style={{textAlign:'center'}}>
            <p className="section-label">Resistance</p>
            <button onClick={()=>upd({resistance:!data.resistance})} style={{width:58,height:58,borderRadius:'50%',border:'none',cursor:'pointer',background:data.resistance?'#2D5A3D':'#F0EBE3',fontSize:22,transition:'all .2s',transform:data.resistance?'scale(1.05)':'scale(1)',boxShadow:data.resistance?'0 4px 14px rgba(45,90,61,.35)':'none'}}>
              {data.resistance?'💪':'🏋️'}
            </button>
            <p style={{fontSize:11,color:data.resistance?'#2D5A3D':'#8B8578',marginTop:6,fontWeight:600}}>{data.resistance?'Done!':'Tap to log'}</p>
          </div>
          <div className="card">
            <p className="section-label">Sports</p>
            <div style={{display:'flex',flexWrap:'wrap',gap:4,minHeight:28}}>
              {(data.sports||[]).map(s=>(
                <span key={s} onClick={()=>toggleSport(s)} style={{background:'#2D5A3D',color:'#fff',borderRadius:10,fontSize:11,padding:'2px 7px',cursor:'pointer'}}>{s} ×</span>
              ))}
              {!(data.sports?.length)&&<span style={{fontSize:11,color:'#B0A898'}}>None</span>}
            </div>
            <button onClick={()=>setShowSports(!showSports)} className="pill-btn add-btn" style={{marginTop:7,width:'100%',fontSize:11}}>{showSports?'Close':'+ Add'}</button>
          </div>
        </div>

        {showSports&&(
          <div className="card" style={{marginBottom:12}}>
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:8}}>
              {SPORTS.map(s=>{const a=(data.sports||[]).includes(s);return(
                <button key={s} className="pill-btn" onClick={()=>toggleSport(s)} style={{background:a?'#2D5A3D':'#F0EBE3',color:a?'#fff':'#1A1A1A'}}>{s}</button>
              )})}
            </div>
            <div style={{display:'flex',gap:8}}>
              <input type="text" value={sportInput} onChange={e=>setSportInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addCustom()} placeholder="Custom activity…"
                style={{flex:1,padding:'7px 10px',borderRadius:10,border:'1px solid #E8E0D0',fontSize:12,background:'#FAF8F5',outline:'none',color:'#1A1A1A'}}/>
              <button className="pill-btn" onClick={addCustom} style={{background:'#E8A84C',color:'#fff'}}>Add</button>
            </div>
          </div>
        )}

        {/* Mood */}
        <div className="card" style={{marginBottom:12}}>
          <p className="section-label">Mood Check-in</p>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <MoodPicker value={data.moodAM} onChange={v=>upd({moodAM:v})} label="☀️ Morning"/>
            <MoodPicker value={data.moodPM} onChange={v=>upd({moodPM:v})} label="🌙 Evening"/>
          </div>
        </div>

        {/* Note */}
        <div className="card">
          <p className="section-label">Note</p>
          <textarea value={data.notes||''} onChange={e=>upd({notes:e.target.value})} placeholder="How did it go?"
            style={{width:'100%',padding:'10px 12px',borderRadius:10,border:'1px solid #E8E0D0',fontSize:13,background:'#FAF8F5',color:'#1A1A1A',resize:'none',height:68,outline:'none',fontFamily:"'DM Sans',sans-serif",lineHeight:1.5}}/>
        </div>
      </div>
    </div>
  );
}

// ── MonthGrid ─────────────────────────────────────────────────────────────────
function MonthGrid({year,month,ver,onDayTap,showResistance=true,compact=false}){
  const today=todayStr();
  const weeks=useMemo(()=>getWeeks(year,month),[year,month]);
  const cellH=compact?22:36;
  const fontSize=compact?10:12;

  return(
    <div>
      {/* Header row */}
      <div style={{display:'grid',gridTemplateColumns:`repeat(7,1fr)${showResistance?' 26px':''}`,gap:2,marginBottom:3}}>
        {DAY_NAMES.map(d=>(
          <span key={d} style={{fontSize:10,color:'#8B8578',textAlign:'center',fontWeight:500}}>{d}</span>
        ))}
        {showResistance&&<span style={{fontSize:9,color:'#2D5A3D',textAlign:'center',lineHeight:'12px'}}>💪</span>}
      </div>

      {weeks.map((week,wi)=>{
        const weekResistance=week.filter(d=>d&&d<=today&&loadDay(d).resistance).length;
        return(
          <div key={wi} style={{display:'grid',gridTemplateColumns:`repeat(7,1fr)${showResistance?' 26px':''}`,gap:2,marginBottom:2}}>
            {week.map((ds,di)=>{
              if(!ds)return<div key={di} style={{minHeight:cellH}}/>;
              const isFuture=ds>today;
              const isToday=ds===today;
              const d=isFuture?emptyDay():loadDay(ds);
              const dayNum=strToDate(ds).getDate();
              const bg=isFuture?'#F8F5F0':heatColor(d.walkMinutes);
              const tc=isFuture?'#C8C0B8':heatTextColor(d.walkMinutes);
              return(
                <button key={di} className="day-cell"
                  onClick={()=>!isFuture&&onDayTap(ds)}
                  style={{background:bg,border:isToday?'2px solid #2D5A3D':'1.5px solid transparent',minHeight:cellH,cursor:isFuture?'default':'pointer'}}>
                  <span style={{fontSize,color:tc,fontWeight:isToday?700:400}}>{dayNum}</span>
                  {!compact&&!isFuture&&d.resistance&&(
                    <span style={{width:4,height:4,borderRadius:'50%',background:d.walkMinutes>=WALK_GOAL?'rgba(255,255,255,.8)':'#2D5A3D',display:'block'}}/>
                  )}
                </button>
              );
            })}
            {showResistance&&(
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3}}>
                {[0,1].map(i=>(
                  <span key={i} style={{width:compact?6:8,height:compact?6:8,borderRadius:'50%',background:weekResistance>i?'#2D5A3D':'#E8E0D0',display:'block'}}/>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── CalendarTab ───────────────────────────────────────────────────────────────
function CalendarTab({ver,onDayTap}){
  const now=new Date();
  const [view,setView]=useState('month');
  const [cy,setCy]=useState(now.getFullYear());
  const [cm,setCm]=useState(now.getMonth());

  const prevMonth=()=>{if(cm===0){setCy(y=>y-1);setCm(11)}else setCm(m=>m-1)};
  const nextMonth=()=>{if(cm===11){setCy(y=>y+1);setCm(0)}else setCm(m=>m+1)};
  const canGoNext=new Date(cy,cm+1,1)<=new Date(now.getFullYear(),now.getMonth()+1,1);

  return(
    <div style={{padding:'16px 16px 0'}}>
      {/* View toggle */}
      <div style={{display:'flex',gap:8,marginBottom:12,justifyContent:'center'}}>
        {['month','year'].map(v=>(
          <button key={v} onClick={()=>setView(v)} style={{flex:1,padding:'8px',border:'none',borderRadius:12,cursor:'pointer',fontSize:13,fontWeight:600,background:view===v?'#2D5A3D':'#F0EBE3',color:view===v?'#fff':'#8B8578',fontFamily:"'DM Sans',sans-serif",textTransform:'capitalize'}}>
            {v==='month'?'📅 Month':'📆 Year'}
          </button>
        ))}
      </div>

      {view==='month'&&(
        <>
          {/* Month navigation */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <button className="nav-btn" onClick={prevMonth}>‹</button>
            <span style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:'#1A1A1A'}}>{monthLabel(cy,cm)}</span>
            <button className="nav-btn" onClick={nextMonth} style={{opacity:canGoNext?1:.3,pointerEvents:canGoNext?'auto':'none'}}>›</button>
          </div>

          <div className="card" style={{marginBottom:12}}>
            <MonthGrid year={cy} month={cm} ver={ver} onDayTap={onDayTap} showResistance={true}/>
            {/* Legend */}
            <div style={{display:'flex',gap:8,marginTop:14,justifyContent:'center',flexWrap:'wrap'}}>
              {[['#EDE8E0','0min'],['#D0E8D8','1-29'],['#A3CDB0','30-59'],['#6AAF82','60-89'],['#2D5A3D','90+ ✓']].map(([c,l])=>(
                <div key={l} style={{display:'flex',alignItems:'center',gap:3}}>
                  <span style={{width:10,height:10,borderRadius:3,background:c,display:'inline-block',border:'1px solid rgba(0,0,0,.08)'}}/>
                  <span style={{fontSize:10,color:'#8B8578'}}>{l}</span>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:6,marginTop:8,justifyContent:'center',alignItems:'center'}}>
              <span style={{width:7,height:7,borderRadius:'50%',background:'#2D5A3D',display:'inline-block'}}/>
              <span style={{fontSize:10,color:'#8B8578'}}>Dot inside cell = resistance day&nbsp;&nbsp;</span>
              <span style={{width:7,height:7,borderRadius:'50%',background:'#2D5A3D',display:'inline-block'}}/>
              <span style={{width:7,height:7,borderRadius:'50%',background:'#E8E0D0',display:'inline-block',marginLeft:-2}}/>
              <span style={{fontSize:10,color:'#8B8578'}}>= weekly resistance (right col)</span>
            </div>
          </div>

          <p style={{fontSize:11,color:'#B0A898',textAlign:'center',marginBottom:12}}>Tap any past day to view or edit</p>
        </>
      )}

      {view==='year'&&(
        <>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <button className="nav-btn" onClick={()=>setCy(y=>y-1)}>‹</button>
            <span style={{fontFamily:"'DM Serif Display',serif",fontSize:20,color:'#1A1A1A'}}>{cy}</span>
            <button className="nav-btn" onClick={()=>setCy(y=>y+1)} style={{opacity:cy<now.getFullYear()?1:.3,pointerEvents:cy<now.getFullYear()?'auto':'none'}}>›</button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,paddingBottom:16}}>
            {Array.from({length:12},(_,i)=>{
              const isFutureMonth=new Date(cy,i,1)>new Date(now.getFullYear(),now.getMonth(),1);
              return(
                <div key={i} className="card" style={{padding:10,opacity:isFutureMonth?.4:1}}>
                  <p style={{fontSize:11,fontWeight:600,color:'#1A1A1A',textAlign:'center',marginBottom:6}}>{monthShort(cy,i)}</p>
                  <MonthGrid year={cy} month={i} ver={ver} onDayTap={onDayTap} showResistance={false} compact={true}/>
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

// ── StatsTab ──────────────────────────────────────────────────────────────────
function StatsTab({ver,streak,weekCompleted,resistanceThisWeek}){
  const now=new Date();
  const [heatMonth,setHeatMonth]=useState(now.getMonth());
  const [heatYear,setHeatYear]=useState(now.getFullYear());
  const today=todayStr();
  const totalDays=Object.keys(getAllData()).length;
  const fileRef=useRef(null);
  const [restoreMsg,setRestoreMsg]=useState(null);

  const prevHeatMonth=()=>{if(heatMonth===0){setHeatYear(y=>y-1);setHeatMonth(11)}else setHeatMonth(m=>m-1)};
  const nextHeatMonth=()=>{if(heatMonth===11){setHeatYear(y=>y+1);setHeatMonth(0)}else setHeatMonth(m=>m+1)};
  const canNext=new Date(heatYear,heatMonth+1,1)<=new Date(now.getFullYear(),now.getMonth()+1,1);

  const exportToiCloud=()=>{
    const data=getAllData();const dc=Object.keys(data).length;
    if(!dc){showToast('Log a day first, then back up!');return}
    const json=JSON.stringify({version:1,exportedAt:new Date().toISOString(),data},null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');
    a.href=url;a.download=`move-backup-${today}.json`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    showToast(`Saved ${dc} days — choose iCloud Drive in Files ☁️`);
  };

  const handleRestore=e=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        if(!parsed.data)throw new Error();
        restoreAllData(parsed.data);
        const count=Object.keys(parsed.data).length;
        setRestoreMsg(`✓ Restored ${count} days`);
        showToast(`✓ Restored ${count} days of data`);
      }catch{setRestoreMsg('⚠️ Invalid file');showToast('⚠️ Couldn\'t read that file')}
    };
    reader.readAsText(file);e.target.value='';
  };

  return(
    <div style={{padding:'16px 16px 0'}}>
      {/* Stat cards */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
        {[
          {label:'Walk Streak',value:`${streak}d`,icon:'🔥',color:'#E8A84C'},
          {label:'Walk Days (7d)',value:`${weekCompleted}/7`,icon:'🚶',color:'#2D5A3D'},
          {label:'Resistance (7d)',value:`${resistanceThisWeek}/2`,icon:'💪',color:'#2D5A3D'},
          {label:'Total Days',value:`${totalDays}`,icon:'📅',color:'#E8A84C'},
        ].map(({label,value,icon,color})=>(
          <div key={label} className="card" style={{textAlign:'center'}}>
            <div style={{fontSize:28,marginBottom:4}}>{icon}</div>
            <div style={{fontSize:24,fontFamily:"'DM Serif Display',serif",color}}>{value}</div>
            <div style={{fontSize:10,color:'#8B8578',textTransform:'uppercase',letterSpacing:.8,marginTop:2}}>{label}</div>
          </div>
        ))}
      </div>

      {/* Monthly heatmap */}
      <div className="card" style={{marginBottom:12}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <button className="nav-btn" onClick={prevHeatMonth} style={{width:28,height:28,fontSize:16}}>‹</button>
          <p className="section-label" style={{marginBottom:0}}>{monthLabel(heatYear,heatMonth)} Activity</p>
          <button className="nav-btn" onClick={nextHeatMonth} style={{width:28,height:28,fontSize:16,opacity:canNext?1:.3,pointerEvents:canNext?'auto':'none'}}>›</button>
        </div>
        <MonthGrid year={heatYear} month={heatMonth} ver={ver} onDayTap={()=>{}} showResistance={true}/>
        <div style={{display:'flex',gap:3,marginTop:12,justifyContent:'center',alignItems:'center'}}>
          <span style={{fontSize:10,color:'#8B8578',marginRight:4}}>Walk:</span>
          {[['#EDE8E0','0'],['#D0E8D8','<30'],['#A3CDB0','<60'],['#6AAF82','<90'],['#2D5A3D','✓90']].map(([c,l])=>(
            <div key={l} style={{display:'flex',alignItems:'center',gap:2}}>
              <span style={{width:9,height:9,borderRadius:2,background:c,display:'inline-block',border:'1px solid rgba(0,0,0,.08)'}}/>
              <span style={{fontSize:9,color:'#8B8578'}}>{l}</span>
            </div>
          ))}
          <span style={{fontSize:10,color:'#8B8578',marginLeft:6}}>💪 = 2×/wk resistance</span>
        </div>
      </div>

      {/* iCloud Backup */}
      <div className="card" style={{marginBottom:12}}>
        <p className="section-label">☁️ iCloud Backup</p>
        <div style={{background:'#F0F8F3',borderRadius:12,padding:'11px 14px',marginBottom:14,borderLeft:'3px solid #2D5A3D'}}>
          <p style={{fontSize:12,color:'#5A7A62',lineHeight:1.7}}>
            Tap <strong>Save</strong> → Files sheet opens → choose <strong>iCloud Drive</strong> → Save.<br/>
            To restore on a new device, tap <strong>Restore</strong> and pick your backup file.
          </p>
        </div>
        <button className="backup-btn" onClick={exportToiCloud} style={{background:'#2D5A3D',color:'#fff',marginBottom:10}}>
          <span style={{fontSize:18}}>☁️</span> Save to iCloud Drive
        </button>
        <button className="backup-btn" onClick={()=>fileRef.current?.click()} style={{background:'#F0EBE3',color:'#1A1A1A'}}>
          <span style={{fontSize:18}}>📂</span> Restore from File
        </button>
        {restoreMsg&&<p style={{fontSize:12,color:'#2D5A3D',textAlign:'center',marginTop:10,fontWeight:600}}>{restoreMsg}</p>}
        <input ref={fileRef} type="file" accept=".json" onChange={handleRestore} style={{display:'none'}}/>
        <p style={{fontSize:11,color:'#B0A898',textAlign:'center',marginTop:12}}>{totalDays} day{totalDays!==1?'s':''} on this device</p>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState('today');
  const [today,setToday]=useState(todayStr);
  const [dayData,setDayData]=useState(()=>loadDay(todayStr()));
  const [modalDate,setModalDate]=useState(null);
  const [ver,setVer]=useState(0); // increments on any save, triggers re-renders
  const bump=()=>setVer(v=>v+1);

  // Midnight rollover — re-initialize today's data when date changes
  useEffect(()=>{
    const check=setInterval(()=>{
      const t=todayStr();
      if(t!==today){setToday(t);setDayData(loadDay(t));bump()}
    },30000);
    return()=>clearInterval(check);
  },[today]);

  const updateToday=patch=>{
    const next={...dayData,...patch};
    setDayData(next);saveDay(today,next);bump();
  };
  const toggleTodaySport=s=>{const c=dayData.sports||[];updateToday({sports:c.includes(s)?c.filter(x=>x!==s):[...c,s]})};
  const [showSports,setShowSports]=useState(false);
  const [sportInput,setSportInput]=useState('');
  const addCustomSport=()=>{if(!sportInput.trim())return;updateToday({sports:[...(dayData.sports||[]),sportInput.trim()]});setSportInput('')};

  // Streak calc
  const getLast7=()=>Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));return localDateStr(d)});
  const days7=getLast7();
  const streak=useMemo(()=>{let s=0;for(const d of[...days7].reverse()){if((loadDay(d).walkMinutes||0)>=WALK_GOAL)s++;else break}return s},[ver,today]);
  const weekCompleted=useMemo(()=>days7.filter(d=>(loadDay(d).walkMinutes||0)>=WALK_GOAL).length,[ver,today]);
  const resistanceThisWeek=useMemo(()=>days7.filter(d=>loadDay(d).resistance).length,[ver,today]);
  const walkDone=dayData.walkMinutes>=WALK_GOAL;

  const handleDayTap=ds=>{
    if(ds===today){setTab('today');return}
    setModalDate(ds);
  };
  const handleModalSaved=(ds,data)=>{bump();if(ds===today)setDayData(data)};

  return(
    <div style={{minHeight:'100vh',background:'#F5F0E8',paddingBottom:80}}>

      {/* Header */}
      <div style={{padding:'52px 20px 16px',background:'linear-gradient(180deg,#2D5A3D,#3A6E4E)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div>
            <h1 style={{fontFamily:"'DM Serif Display',serif",color:'#fff',fontSize:26,fontWeight:400}}>
              {tab==='today'?`${new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}`:tab==='calendar'?'Calendar':'Progress'}
            </h1>
            <p style={{color:'rgba(255,255,255,.65)',fontSize:12,marginTop:2}}>
              {tab==='today'?(walkDone?'Walk goal crushed 🌿':`${WALK_GOAL-dayData.walkMinutes} min to goal`):
               tab==='calendar'?'Tap any past day to view or edit':
               `${weekCompleted}/7 walk days · ${resistanceThisWeek} resistance sessions`}
            </p>
          </div>
          {streak>0&&(
            <div style={{background:'rgba(255,255,255,.15)',borderRadius:14,padding:'6px 12px',textAlign:'center'}}>
              <div style={{fontSize:18}}>🔥</div>
              <div style={{color:'#fff',fontSize:11,fontWeight:600}}>{streak}d</div>
            </div>
          )}
        </div>
      </div>

      {/* TODAY */}
      {tab==='today'&&(
        <div style={{padding:'16px 16px 0'}}>
          <div className="card" style={{marginBottom:12}}>
            <p className="section-label">Daily Walk · Tap from Apple Health</p>
            <WalkRing minutes={dayData.walkMinutes} goal={WALK_GOAL}/>
            <div style={{display:'flex',gap:8,marginTop:16,justifyContent:'center',flexWrap:'wrap'}}>
              {[15,30,45,60,90].map(m=>(
                <button key={m} className="pill-btn add-btn" onClick={()=>updateToday({walkMinutes:Math.min(dayData.walkMinutes+m,300)})}> +{m}</button>
              ))}
            </div>
            {dayData.walkMinutes>0&&<button onClick={()=>updateToday({walkMinutes:0})} style={{display:'block',margin:'10px auto 0',background:'none',border:'none',color:'#C09070',fontSize:12,cursor:'pointer'}}>Reset</button>}
            <p style={{fontSize:11,color:'#B0A898',textAlign:'center',marginTop:10}}>Open Health → Activity, note your walk minutes, tap above</p>
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
            <div className="card" style={{textAlign:'center'}}>
              <p className="section-label">Resistance</p>
              <button onClick={()=>updateToday({resistance:!dayData.resistance})} style={{width:64,height:64,borderRadius:'50%',border:'none',cursor:'pointer',background:dayData.resistance?'#2D5A3D':'#F0EBE3',fontSize:26,transition:'all .2s',transform:dayData.resistance?'scale(1.05)':'scale(1)',boxShadow:dayData.resistance?'0 4px 14px rgba(45,90,61,.35)':'none'}}>
                {dayData.resistance?'💪':'🏋️'}
              </button>
              <p style={{fontSize:11,color:dayData.resistance?'#2D5A3D':'#8B8578',marginTop:8,fontWeight:600}}>{dayData.resistance?'Done!':'Tap to log'}</p>
              <p style={{fontSize:10,color:'#B0A898',marginTop:2}}>{resistanceThisWeek}/2 this week</p>
            </div>
            <div className="card">
              <p className="section-label">Sports / Other</p>
              <div style={{display:'flex',flexWrap:'wrap',gap:5,minHeight:36}}>
                {(dayData.sports||[]).map(s=>(
                  <span key={s} onClick={()=>toggleTodaySport(s)} style={{background:'#2D5A3D',color:'#fff',borderRadius:10,fontSize:11,padding:'3px 8px',cursor:'pointer'}}>{s} ×</span>
                ))}
                {!(dayData.sports?.length)&&<span style={{fontSize:11,color:'#B0A898'}}>None logged</span>}
              </div>
              <button onClick={()=>setShowSports(!showSports)} className="pill-btn add-btn" style={{marginTop:8,width:'100%',fontSize:12}}>{showSports?'Close':'+ Add Activity'}</button>
            </div>
          </div>

          {showSports&&(
            <div className="card" style={{marginBottom:12}}>
              <p className="section-label">Choose Activity</p>
              <div style={{display:'flex',flexWrap:'wrap',gap:7,marginBottom:10}}>
                {SPORTS.map(s=>{const a=(dayData.sports||[]).includes(s);return(
                  <button key={s} className="pill-btn" onClick={()=>toggleTodaySport(s)} style={{background:a?'#2D5A3D':'#F0EBE3',color:a?'#fff':'#1A1A1A'}}>{s}</button>
                )})}
              </div>
              <div style={{display:'flex',gap:8}}>
                <input type="text" value={sportInput} onChange={e=>setSportInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addCustomSport()} placeholder="Custom activity…"
                  style={{flex:1,padding:'8px 12px',borderRadius:10,border:'1px solid #E8E0D0',fontSize:13,background:'#FAF8F5',outline:'none',color:'#1A1A1A'}}/>
                <button className="pill-btn" onClick={addCustomSport} style={{background:'#E8A84C',color:'#fff'}}>Add</button>
              </div>
            </div>
          )}

          <div className="card" style={{marginBottom:12}}>
            <p className="section-label">Mood Check-in</p>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
              <MoodPicker value={dayData.moodAM} onChange={v=>updateToday({moodAM:v})} label="☀️ Morning"/>
              <MoodPicker value={dayData.moodPM} onChange={v=>updateToday({moodPM:v})} label="🌙 Evening"/>
            </div>
          </div>

          <div className="card" style={{marginBottom:12}}>
            <p className="section-label">Quick Note</p>
            <textarea value={dayData.notes||''} onChange={e=>updateToday({notes:e.target.value})} placeholder="How did it feel?"
              style={{width:'100%',padding:'10px 12px',borderRadius:10,border:'1px solid #E8E0D0',fontSize:13,background:'#FAF8F5',color:'#1A1A1A',resize:'none',height:72,outline:'none',fontFamily:"'DM Sans',sans-serif",lineHeight:1.5}}/>
          </div>
        </div>
      )}

      {/* CALENDAR */}
      {tab==='calendar'&&(
        <CalendarTab ver={ver} onDayTap={handleDayTap}/>
      )}

      {/* STATS */}
      {tab==='stats'&&(
        <StatsTab ver={ver} streak={streak} weekCompleted={weekCompleted} resistanceThisWeek={resistanceThisWeek}/>
      )}

      {/* Day edit modal */}
      {modalDate&&(
        <DayEditSheet dateStr={modalDate} onClose={()=>setModalDate(null)} onSaved={handleModalSaved}/>
      )}

      {/* Bottom Nav */}
      <div style={{position:'fixed',bottom:0,left:0,right:0,background:'rgba(255,255,255,.95)',backdropFilter:'blur(12px)',borderTop:'1px solid #EDE8E0',display:'flex',padding:'8px 0 20px'}}>
        {[
          {id:'today',icon:'🌿',label:'Today'},
          {id:'calendar',icon:'📅',label:'Calendar'},
          {id:'stats',icon:'📊',label:'Stats'},
        ].map(({id,icon,label})=>(
          <button key={id} className="tab-btn" onClick={()=>setTab(id)} style={{color:tab===id?'#2D5A3D':'#8B8578'}}>
            <span style={{fontSize:22}}>{icon}</span>
            <span style={{fontSize:10,fontWeight:tab===id?600:400,letterSpacing:.5}}>{label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
