<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Move" />
  <title>Move — Daily Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #F5F0E8; font-family: 'DM Sans', sans-serif; }
    #root { height: 100%; }
    .tab-btn { background: none; border: none; cursor: pointer; padding: 8px 0; display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; }
    .pill-btn { border: none; border-radius: 20px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 8px 14px; transition: all 0.15s; }
    .add-btn { background: #F0EBE3; color: #1A1A1A; }
    .add-btn:active { background: #E4DDD2; transform: scale(0.97); }
    .card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); }
    .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #8B8578; margin-bottom: 10px; }
    textarea, input[type=text] { font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { display: none; }
    .backup-btn { width: 100%; padding: 14px; border: none; border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .backup-btn:active { transform: scale(0.97); }
    .toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: #1A1A1A; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div class="toast" id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const todayStr = () => new Date().toISOString().split("T")[0];
    const formatDate = (dateStr) => {
      const d = new Date(dateStr + "T12:00:00");
      return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
    };
    const getLast7Days = () =>
      Array.from({ length: 7 }, (_, i) => {
        const d = new Date();
        d.setDate(d.getDate() - (6 - i));
        return d.toISOString().split("T")[0];
      });
    const emptyDay = () => ({ walkMinutes: 0, resistance: false, sports: [], moodAM: null, moodPM: null, notes: "" });

    const MOODS = [
      { val: 1, emoji: "😞" }, { val: 2, emoji: "😕" },
      { val: 3, emoji: "😐" }, { val: 4, emoji: "🙂" }, { val: 5, emoji: "😄" },
    ];
    const SPORTS = ["🏐 Volleyball", "🚴 Cycling", "🏊 Swimming", "🎾 Tennis", "🧘 Yoga", "🏃 Run"];
    const WALK_GOAL = 90;
    const PREFIX = "move:day:";

    const loadDay = (date) => {
      try { const r = localStorage.getItem(`${PREFIX}${date}`); return r ? JSON.parse(r) : emptyDay(); }
      catch { return emptyDay(); }
    };
    const saveDay = (date, data) => {
      try { localStorage.setItem(`${PREFIX}${date}`, JSON.stringify(data)); } catch {}
    };
    const loadWeekData = (days) => {
      const r = {}; days.forEach(d => { r[d] = loadDay(d); }); return r;
    };
    const getAllData = () => {
      const all = {};
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith(PREFIX)) {
          try { all[key] = JSON.parse(localStorage.getItem(key)); } catch {}
        }
      }
      return all;
    };
    const restoreAllData = (obj) => {
      Object.entries(obj).forEach(([key, val]) => {
        if (key.startsWith(PREFIX)) {
          try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
        }
      });
    };

    const showToast = (msg) => {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 2800);
    };

    const exportToiCloud = () => {
      const data = getAllData();
      const dayCount = Object.keys(data).length;
      if (dayCount === 0) { showToast("Log a day first, then back up!"); return; }
      const json = JSON.stringify({ version: 1, exportedAt: new Date().toISOString(), data }, null, 2);
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `move-backup-${todayStr()}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast(`Saved ${dayCount} days — choose iCloud Drive in Files ☁️`);
    };

    function WalkRing({ minutes, goal }) {
      const pct = Math.min(minutes / goal, 1);
      const r = 52, circ = 2 * Math.PI * r, done = minutes >= goal;
      return (
        <div style={{ position: "relative", width: 140, height: 140, margin: "0 auto" }}>
          <svg width="140" height="140" style={{ transform: "rotate(-90deg)" }}>
            <circle cx="70" cy="70" r={r} fill="none" stroke="#E8E0D0" strokeWidth="10" />
            <circle cx="70" cy="70" r={r} fill="none" stroke={done ? "#2D5A3D" : "#E8A84C"} strokeWidth="10"
              strokeDasharray={`${pct * circ} ${circ}`} strokeLinecap="round"
              style={{ transition: "stroke-dasharray 0.5s ease" }} />
          </svg>
          <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
            <span style={{ fontSize: 28, fontWeight: 700, color: done ? "#2D5A3D" : "#1A1A1A", fontFamily: "'DM Serif Display', serif" }}>{minutes}</span>
            <span style={{ fontSize: 11, color: "#8B8578", letterSpacing: 1, textTransform: "uppercase" }}>/ {goal} min</span>
            {done && <span style={{ fontSize: 16, marginTop: 2 }}>✓</span>}
          </div>
        </div>
      );
    }

    function MoodPicker({ value, onChange, label }) {
      return (
        <div>
          <p style={{ margin: "0 0 8px", fontSize: 11, textTransform: "uppercase", letterSpacing: 1, color: "#8B8578" }}>{label}</p>
          <div style={{ display: "flex", gap: 4, justifyContent: "center" }}>
            {MOODS.map(m => (
              <button key={m.val} onClick={() => onChange(value === m.val ? null : m.val)} style={{
                background: value === m.val ? "#2D5A3D" : "#F0EBE3", border: "none", borderRadius: 12,
                padding: "7px 9px", fontSize: 18, cursor: "pointer",
                transform: value === m.val ? "scale(1.15)" : "scale(1)", transition: "all 0.15s",
                boxShadow: value === m.val ? "0 2px 8px rgba(45,90,61,0.3)" : "none"
              }}>{m.emoji}</button>
            ))}
          </div>
        </div>
      );
    }

    function WeekBar({ days, weekData }) {
      const dn = ["Su","Mo","Tu","We","Th","Fr","Sa"];
      return (
        <div style={{ display: "flex", gap: 6, justifyContent: "space-between" }}>
          {days.map(d => {
            const data = weekData[d] || emptyDay();
            const pct = Math.min(data.walkMinutes / WALK_GOAL, 1);
            const isToday = d === todayStr();
            return (
              <div key={d} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                <span style={{ fontSize: 10, color: isToday ? "#2D5A3D" : "#8B8578", fontWeight: isToday ? 700 : 400 }}>
                  {dn[new Date(d + "T12:00:00").getDay()]}
                </span>
                <div style={{ width: "100%", height: 44, background: "#F0EBE3", borderRadius: 8, overflow: "hidden", position: "relative" }}>
                  <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: `${pct * 100}%`, background: pct >= 1 ? "#2D5A3D" : "#E8A84C", borderRadius: "6px 6px 0 0", transition: "height 0.4s" }} />
                  {isToday && <div style={{ position: "absolute", inset: 0, border: "2px solid #2D5A3D", borderRadius: 8, pointerEvents: "none" }} />}
                </div>
                <div style={{ display: "flex", gap: 2 }}>
                  <span style={{ width: 6, height: 6, borderRadius: "50%", background: data.resistance ? "#2D5A3D" : "#E8E0D0" }} />
                  <span style={{ width: 6, height: 6, borderRadius: "50%", background: data.sports?.length ? "#E8A84C" : "#E8E0D0" }} />
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function App() {
      const [tab, setTab] = useState("today");
      const [today] = useState(todayStr());
      const [dayData, setDayData] = useState(() => loadDay(todayStr()));
      const [weekData, setWeekData] = useState(() => loadWeekData(getLast7Days()));
      const [sportInput, setSportInput] = useState("");
      const [showSportPicker, setShowSportPicker] = useState(false);
      const [streak, setStreak] = useState(0);
      const [restoreMsg, setRestoreMsg] = useState(null);
      const fileRef = useRef(null);
      const days7 = getLast7Days();

      const calcStreak = useCallback((wData) => {
        let s = 0;
        for (const d of [...days7].reverse()) {
          if ((wData[d]?.walkMinutes || 0) >= WALK_GOAL) s++; else break;
        }
        setStreak(s);
      }, []);

      useEffect(() => { calcStreak({ ...weekData, [today]: dayData }); }, [dayData, weekData]);

      const update = (patch) => {
        const next = { ...dayData, ...patch };
        setDayData(next);
        const nw = { ...weekData, [today]: next };
        setWeekData(nw);
        saveDay(today, next);
      };

      const toggleSport = (s) => {
        const c = dayData.sports || [];
        update({ sports: c.includes(s) ? c.filter(x => x !== s) : [...c, s] });
      };

      const addCustomSport = () => {
        if (!sportInput.trim()) return;
        update({ sports: [...(dayData.sports || []), sportInput.trim()] });
        setSportInput("");
      };

      const handleRestore = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const parsed = JSON.parse(ev.target.result);
            if (!parsed.data) throw new Error();
            restoreAllData(parsed.data);
            const restored = loadWeekData(days7);
            setWeekData(restored);
            setDayData(loadDay(today));
            const count = Object.keys(parsed.data).length;
            setRestoreMsg(`✓ Restored ${count} days`);
            showToast(`✓ Restored ${count} days of data`);
          } catch {
            setRestoreMsg("⚠️ Couldn't read that file");
            showToast("⚠️ Invalid backup file");
          }
        };
        reader.readAsText(file);
        e.target.value = "";
      };

      const walkDone = dayData.walkMinutes >= WALK_GOAL;
      const weekCompleted = days7.filter(d => (weekData[d]?.walkMinutes || 0) >= WALK_GOAL).length;
      const resistanceThisWeek = days7.filter(d => weekData[d]?.resistance).length;
      const totalDays = Object.keys(getAllData()).length;

      return (
        <div style={{ minHeight: "100vh", background: "#F5F0E8", paddingBottom: 80 }}>

          {/* Header */}
          <div style={{ padding: "52px 20px 16px", background: "linear-gradient(180deg, #2D5A3D, #3A6E4E)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <h1 style={{ fontFamily: "'DM Serif Display', serif", color: "#fff", fontSize: 26, fontWeight: 400 }}>
                  {tab === "today" ? formatDate(today) : tab === "week" ? "This Week" : "Progress"}
                </h1>
                <p style={{ color: "rgba(255,255,255,0.65)", fontSize: 12, marginTop: 2 }}>
                  {tab === "today"
                    ? walkDone ? "Walk goal crushed 🌿" : `${WALK_GOAL - dayData.walkMinutes} min to goal`
                    : `${weekCompleted}/7 walk days · ${resistanceThisWeek} resistance sessions`}
                </p>
              </div>
              {streak > 0 && (
                <div style={{ background: "rgba(255,255,255,0.15)", borderRadius: 14, padding: "6px 12px", textAlign: "center" }}>
                  <div style={{ fontSize: 18 }}>🔥</div>
                  <div style={{ color: "#fff", fontSize: 11, fontWeight: 600 }}>{streak}d</div>
                </div>
              )}
            </div>
          </div>

          {/* ── TODAY ── */}
          {tab === "today" && (
            <div style={{ padding: "16px 16px 0" }}>
              <div className="card" style={{ marginBottom: 12 }}>
                <p className="section-label">Daily Walk · Tap your minutes from Apple Health</p>
                <WalkRing minutes={dayData.walkMinutes} goal={WALK_GOAL} />
                <div style={{ display: "flex", gap: 8, marginTop: 16, justifyContent: "center", flexWrap: "wrap" }}>
                  {[15, 30, 45, 60, 90].map(m => (
                    <button key={m} className="pill-btn add-btn" onClick={() => update({ walkMinutes: Math.min(dayData.walkMinutes + m, 300) })}>+{m}</button>
                  ))}
                </div>
                {dayData.walkMinutes > 0 && (
                  <button onClick={() => update({ walkMinutes: 0 })}
                    style={{ display: "block", margin: "10px auto 0", background: "none", border: "none", color: "#C09070", fontSize: 12, cursor: "pointer" }}>
                    Reset
                  </button>
                )}
                <p style={{ fontSize: 11, color: "#B0A898", textAlign: "center", marginTop: 10 }}>
                  Open Health → Activity, note your walk minutes, tap above
                </p>
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
                <div className="card" style={{ textAlign: "center" }}>
                  <p className="section-label">Resistance</p>
                  <button onClick={() => update({ resistance: !dayData.resistance })} style={{
                    width: 64, height: 64, borderRadius: "50%", border: "none", cursor: "pointer",
                    background: dayData.resistance ? "#2D5A3D" : "#F0EBE3", fontSize: 26, transition: "all 0.2s",
                    transform: dayData.resistance ? "scale(1.05)" : "scale(1)",
                    boxShadow: dayData.resistance ? "0 4px 14px rgba(45,90,61,0.35)" : "none"
                  }}>{dayData.resistance ? "💪" : "🏋️"}</button>
                  <p style={{ fontSize: 11, color: dayData.resistance ? "#2D5A3D" : "#8B8578", marginTop: 8, fontWeight: 600 }}>
                    {dayData.resistance ? "Done!" : "Tap to log"}
                  </p>
                  <p style={{ fontSize: 10, color: "#B0A898", marginTop: 2 }}>{resistanceThisWeek}/2 this week</p>
                </div>

                <div className="card">
                  <p className="section-label">Sports / Other</p>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 5, minHeight: 36 }}>
                    {(dayData.sports || []).map(s => (
                      <span key={s} onClick={() => toggleSport(s)} style={{ background: "#2D5A3D", color: "#fff", borderRadius: 10, fontSize: 11, padding: "3px 8px", cursor: "pointer" }}>{s} ×</span>
                    ))}
                    {!(dayData.sports?.length) && <span style={{ fontSize: 11, color: "#B0A898" }}>None logged</span>}
                  </div>
                  <button onClick={() => setShowSportPicker(!showSportPicker)}
                    className="pill-btn add-btn" style={{ marginTop: 8, width: "100%", fontSize: 12 }}>
                    {showSportPicker ? "Close" : "+ Add Activity"}
                  </button>
                </div>
              </div>

              {showSportPicker && (
                <div className="card" style={{ marginBottom: 12 }}>
                  <p className="section-label">Choose Activity</p>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginBottom: 10 }}>
                    {SPORTS.map(s => {
                      const active = (dayData.sports || []).includes(s);
                      return (
                        <button key={s} className="pill-btn" onClick={() => toggleSport(s)}
                          style={{ background: active ? "#2D5A3D" : "#F0EBE3", color: active ? "#fff" : "#1A1A1A" }}>{s}</button>
                      );
                    })}
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <input type="text" value={sportInput} onChange={e => setSportInput(e.target.value)}
                      onKeyDown={e => e.key === "Enter" && addCustomSport()}
                      placeholder="Custom activity…"
                      style={{ flex: 1, padding: "8px 12px", borderRadius: 10, border: "1px solid #E8E0D0", fontSize: 13, background: "#FAF8F5", outline: "none", color: "#1A1A1A" }} />
                    <button className="pill-btn" onClick={addCustomSport} style={{ background: "#E8A84C", color: "#fff" }}>Add</button>
                  </div>
                </div>
              )}

              <div className="card" style={{ marginBottom: 12 }}>
                <p className="section-label">Mood Check-in</p>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                  <MoodPicker value={dayData.moodAM} onChange={v => update({ moodAM: v })} label="☀️ Morning" />
                  <MoodPicker value={dayData.moodPM} onChange={v => update({ moodPM: v })} label="🌙 Evening" />
                </div>
              </div>

              <div className="card" style={{ marginBottom: 12 }}>
                <p className="section-label">Quick Note</p>
                <textarea value={dayData.notes || ""} onChange={e => update({ notes: e.target.value })}
                  placeholder="How did it feel? Anything to remember…"
                  style={{ width: "100%", padding: "10px 12px", borderRadius: 10, border: "1px solid #E8E0D0", fontSize: 13, background: "#FAF8F5", color: "#1A1A1A", resize: "none", height: 72, outline: "none", fontFamily: "'DM Sans', sans-serif", lineHeight: 1.5 }} />
              </div>
            </div>
          )}

          {/* ── WEEK ── */}
          {tab === "week" && (
            <div style={{ padding: "16px 16px 0" }}>
              <div className="card" style={{ marginBottom: 12 }}>
                <p className="section-label">Walk Progress · Goal: {WALK_GOAL} min/day</p>
                <WeekBar days={days7} weekData={weekData} />
                <div style={{ display: "flex", gap: 16, marginTop: 12, justifyContent: "center" }}>
                  {[["#2D5A3D","Resistance"],["#E8A84C","Sport"]].map(([c,l]) => (
                    <div key={l} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                      <span style={{ width: 8, height: 8, borderRadius: "50%", background: c, display: "inline-block" }} />
                      <span style={{ fontSize: 11, color: "#8B8578" }}>{l}</span>
                    </div>
                  ))}
                </div>
              </div>
              {[...days7].reverse().map(d => {
                const data = weekData[d] || emptyDay();
                const isToday = d === todayStr();
                const moodObj = MOODS.find(m => m.val === data.moodAM);
                return (
                  <div key={d} className="card" style={{ marginBottom: 8 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div>
                        <span style={{ fontWeight: 600, fontSize: 14, color: isToday ? "#2D5A3D" : "#1A1A1A" }}>
                          {isToday ? "Today" : formatDate(d)}
                        </span>
                        <div style={{ display: "flex", gap: 6, marginTop: 4, flexWrap: "wrap" }}>
                          <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 8, background: data.walkMinutes >= WALK_GOAL ? "#E8F5EC" : "#F5F0E8", color: data.walkMinutes >= WALK_GOAL ? "#2D5A3D" : "#8B8578" }}>
                            🚶 {data.walkMinutes}min
                          </span>
                          {data.resistance && <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 8, background: "#E8F5EC", color: "#2D5A3D" }}>💪 Resistance</span>}
                          {(data.sports || []).map(s => (
                            <span key={s} style={{ fontSize: 11, padding: "2px 8px", borderRadius: 8, background: "#FFF5E8", color: "#B07A20" }}>{s}</span>
                          ))}
                        </div>
                      </div>
                      {moodObj && <span style={{ fontSize: 22 }}>{moodObj.emoji}</span>}
                    </div>
                    {data.notes && <p style={{ fontSize: 12, color: "#8B8578", marginTop: 8, fontStyle: "italic" }}>"{data.notes}"</p>}
                  </div>
                );
              })}
            </div>
          )}

          {/* ── STATS + BACKUP ── */}
          {tab === "stats" && (
            <div style={{ padding: "16px 16px 0" }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
                {[
                  { label: "Walk Streak", value: `${streak}d`, icon: "🔥", color: "#E8A84C" },
                  { label: "Walk Days (7d)", value: `${weekCompleted}/7`, icon: "🚶", color: "#2D5A3D" },
                  { label: "Resistance (7d)", value: `${resistanceThisWeek}/2`, icon: "💪", color: "#2D5A3D" },
                  { label: "Total Days", value: `${totalDays}`, icon: "📅", color: "#E8A84C" },
                ].map(({ label, value, icon, color }) => (
                  <div key={label} className="card" style={{ textAlign: "center" }}>
                    <div style={{ fontSize: 28, marginBottom: 4 }}>{icon}</div>
                    <div style={{ fontSize: 26, fontFamily: "'DM Serif Display', serif", color }}>{value}</div>
                    <div style={{ fontSize: 11, color: "#8B8578", textTransform: "uppercase", letterSpacing: 0.8, marginTop: 2 }}>{label}</div>
                  </div>
                ))}
              </div>

              <div className="card" style={{ marginBottom: 12 }}>
                <p className="section-label">This Week at a Glance</p>
                <table style={{ width: "100%", borderCollapse: "collapse" }}>
                  <thead>
                    <tr>{["Day","Walk","Lift","Sport","Mood"].map(h => (
                      <th key={h} style={{ padding: "4px 6px", color: "#8B8578", fontWeight: 500, textAlign: "center", fontSize: 11 }}>{h}</th>
                    ))}</tr>
                  </thead>
                  <tbody>
                    {days7.map(d => {
                      const data = weekData[d] || emptyDay();
                      const dn = ["Su","Mo","Tu","We","Th","Fr","Sa"][new Date(d + "T12:00:00").getDay()];
                      const isToday = d === todayStr();
                      const moodObj = MOODS.find(m => m.val === data.moodAM);
                      return (
                        <tr key={d} style={{ background: isToday ? "#F0F8F3" : "transparent" }}>
                          <td style={{ padding: 6, textAlign: "center", fontWeight: isToday ? 700 : 400, color: isToday ? "#2D5A3D" : "#1A1A1A", fontSize: 12 }}>{dn}</td>
                          <td style={{ padding: 6, textAlign: "center", fontSize: 12, color: data.walkMinutes >= WALK_GOAL ? "#2D5A3D" : data.walkMinutes > 0 ? "#E8A84C" : "#C0B8B0" }}>
                            {data.walkMinutes > 0 ? `${data.walkMinutes}m` : "–"}
                          </td>
                          <td style={{ padding: 6, textAlign: "center", fontSize: 12 }}>{data.resistance ? "✓" : "–"}</td>
                          <td style={{ padding: 6, textAlign: "center", fontSize: 12 }}>{data.sports?.length ? "✓" : "–"}</td>
                          <td style={{ padding: 6, textAlign: "center", fontSize: 14 }}>{moodObj ? moodObj.emoji : "–"}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>

              {/* ── iCloud Backup ── */}
              <div className="card" style={{ marginBottom: 12 }}>
                <p className="section-label">☁️ iCloud Backup</p>

                <div style={{
                  background: "#F0F8F3", borderRadius: 12, padding: "12px 14px",
                  marginBottom: 16, borderLeft: "3px solid #2D5A3D"
                }}>
                  <p style={{ fontSize: 12, color: "#2D5A3D", fontWeight: 600, marginBottom: 4 }}>How it works</p>
                  <p style={{ fontSize: 12, color: "#5A7A62", lineHeight: 1.7 }}>
                    1. Tap <strong>Save to iCloud Drive</strong> below<br/>
                    2. iOS Files sheet opens — navigate to <strong>iCloud Drive</strong><br/>
                    3. Optionally create a folder called <strong>Move Backups</strong><br/>
                    4. Tap <strong>Save</strong> — done ✓<br/><br/>
                    To restore on a new device, tap <strong>Restore from File</strong> and pick your latest backup from iCloud Drive.
                  </p>
                </div>

                <button className="backup-btn" onClick={exportToiCloud}
                  style={{ background: "#2D5A3D", color: "#fff", marginBottom: 10 }}>
                  <span style={{ fontSize: 20 }}>☁️</span> Save to iCloud Drive
                </button>

                <button className="backup-btn" onClick={() => fileRef.current?.click()}
                  style={{ background: "#F0EBE3", color: "#1A1A1A" }}>
                  <span style={{ fontSize: 20 }}>📂</span> Restore from File
                </button>

                {restoreMsg && (
                  <p style={{ fontSize: 12, color: "#2D5A3D", textAlign: "center", marginTop: 12, fontWeight: 600 }}>
                    {restoreMsg}
                  </p>
                )}

                <input ref={fileRef} type="file" accept=".json" onChange={handleRestore} style={{ display: "none" }} />

                <p style={{ fontSize: 11, color: "#B0A898", textAlign: "center", marginTop: 14 }}>
                  {totalDays} day{totalDays !== 1 ? "s" : ""} currently on this device
                </p>
              </div>
            </div>
          )}

          {/* Bottom Nav */}
          <div style={{
            position: "fixed", bottom: 0, left: 0, right: 0,
            background: "rgba(255,255,255,0.95)", backdropFilter: "blur(12px)",
            borderTop: "1px solid #EDE8E0", display: "flex", padding: "8px 0 20px"
          }}>
            {[
              { id: "today", icon: "🌿", label: "Today" },
              { id: "week", icon: "📅", label: "Week" },
              { id: "stats", icon: "📊", label: "Stats" },
            ].map(({ id, icon, label }) => (
              <button key={id} className="tab-btn" onClick={() => setTab(id)}
                style={{ color: tab === id ? "#2D5A3D" : "#8B8578" }}>
                <span style={{ fontSize: 22 }}>{icon}</span>
                <span style={{ fontSize: 10, fontWeight: tab === id ? 600 : 400, letterSpacing: 0.5 }}>{label}</span>
              </button>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

</body>
</html>
